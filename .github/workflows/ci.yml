name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Prepare build folder
        run: mkdir -p build

      - name: Build binary (linux/${{ matrix.goarch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o build/pwndrop-linux-${{ matrix.goarch }} ./

      - name: Vet
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

      - name: Test (amd64 only)
        if: matrix.goarch == 'amd64'
        run: go test ./...

      # UPLOAD ARTIFACT PER RELEASE STEP
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwndrop-linux-${{ matrix.goarch }}
          path: build/pwndrop-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}